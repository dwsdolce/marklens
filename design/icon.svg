<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Marklens app icon.
    Geometry built around 1024×1024. A rounded-rect background (Apple superellipse
    approximation via cubic Béziers) sits behind a stylized "M" whose strokes
    terminate in subtle ▼ carets — a nod to markdown's heading/list arrows
    without spelling out "MD". Tuned for clarity at 32×32.
  -->
  <defs>
    <!-- macOS Pro blue gradient, top-left lighter to bottom-right deeper. -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#3aa0ff"/>
      <stop offset="0.55" stop-color="#0a84ff"/>
      <stop offset="1"   stop-color="#0050d0"/>
    </linearGradient>

    <!-- Glyph fill: warm white with a faint vertical sheen for depth. -->
    <linearGradient id="glyphGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef4ff"/>
    </linearGradient>

    <!-- Soft inner highlight along the top edge of the background. -->
    <linearGradient id="topGloss" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Drop shadow for the glyph — sits inside the rounded square. -->
    <filter id="glyphShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.18"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft clip path matching the background, so the gloss can't overflow. -->
    <clipPath id="bgClip">
      <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225"/>
    </clipPath>
  </defs>

  <!-- Background plate -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bgGrad)"/>

  <!-- Top gloss inside the rounded square -->
  <g clip-path="url(#bgClip)">
    <rect x="0" y="0" width="1024" height="430" fill="url(#topGloss)"/>
  </g>

  <!--
    The "M" glyph.
    A filled polygon: outer legs at x∈[210,334] and x∈[690,814]; central V with
    apex at (512, 640); inner cutouts whose tips meet the M's top edge inset.
    Two ▼ carets hang from the outer feet (centered at x=272 and x=752) — a
    subtle Markdown nod. Stroke thickness is generous (~110px) so the form
    holds up at small sizes.
  -->
  <g filter="url(#glyphShadow)">
    <!-- Outer M shape (filled) -->
    <path fill="url(#glyphGrad)" fill-rule="evenodd" d="
      M 210 250
      L 372 250
      L 512 640
      L 652 250
      L 814 250
      L 814 820
      L 690 820
      L 690 470
      L 558 820
      L 466 820
      L 334 470
      L 334 820
      L 210 820
      Z" />

    <!-- Two small ▼ caret tips centered on the M's outer feet —
         symmetric around x=512, a subtle Markdown nod. -->
    <path fill="url(#glyphGrad)" d="
      M 232 838
      L 312 838
      L 272 898
      Z"/>
    <path fill="url(#glyphGrad)" d="
      M 712 838
      L 792 838
      L 752 898
      Z"/>
  </g>
</svg>
